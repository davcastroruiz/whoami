career-profile:
    title: Who am I?
    summary: |
      Senior Software Development Engineer with nearly 10 years of experience designing scalable backend services, automation platforms, and enterprise software solutions.

      At F5, I build telemetry, licensing, and mediation systems that support a portfolio of 250+ enterprise products. My work focuses on backend development, automation, CI/CD, distributed systems, production reliability, and developer productivity.
      I enjoy solving complex engineering problems, improving software quality through automation, and collaborating across teams to deliver reliable, maintainable systems. More recently, I've been exploring Generative AI, local LLMs, and AI-powered workflow automation to accelerate software development and engineering operations.

      Core Technologies
      Backend - TypeScript, Node.js, Python
      Cloud & DevOps - Azure DevOps, Docker, CI/CD, Git
      Databases - Cosmos DB, Snowflake, SQL
      AI- Generative AI, Ollama, ComfyUI, n8n, Prompt Engineering
      Methodologies - Agile, Scrum, Code Reviews

